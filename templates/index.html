<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Растем вместе</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tab-active { color: #f59e0b; }
        .tab-inactive { color: #9ca3af; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 pb-20">
    
    <div class="bg-white p-5 rounded-b-[2rem] shadow-sm border-b border-gray-100 flex justify-between items-center sticky top-0 z-40">
        <div>
            <h1 class="text-2xl font-bold flex items-center gap-2 text-gray-800">
                <i class="fas fa-sun text-yellow-400"></i> Растем вместе
            </h1>
            <p class="text-gray-500 text-xs mt-1">Сообщество родителей</p>
        </div>
        <button onclick="alert('В будущем здесь откроется чат с Ангелом-помощником!')" class="w-10 h-10 bg-yellow-50 rounded-full flex items-center justify-center text-yellow-500 shadow-sm relative">
            <i class="fas fa-dove"></i>
            <span class="absolute top-0 right-0 w-2.5 h-2.5 bg-red-400 rounded-full border-2 border-white"></span>
        </button>
    </div>

    <div class="mx-4 mt-4 bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center border border-gray-100">
        <div class="flex items-center gap-3 text-gray-700">
            <i class="fas fa-map-marker-alt text-yellow-400 text-lg"></i>
            <div>
                <div class="font-bold text-sm" id="locText">Батуми, Грузия</div>
            </div>
        </div>
        <button class="text-yellow-500 font-bold text-xs flex items-center gap-1 bg-yellow-50 px-3 py-1.5 rounded-lg">
            Изменить
        </button>
    </div>

    <div id="mainContent" class="p-4">
        <div class="flex justify-between items-center mb-4">
            <h2 id="sectionTitle" class="font-bold text-lg text-gray-800">📦 Желтый чемоданчик</h2>
            <span class="text-xs bg-gray-100 px-2 py-1 rounded text-gray-500">Свежее</span>
        </div>
        
        <div id="grid" class="grid grid-cols-2 gap-4">
            <div class="col-span-2 text-center py-10 text-gray-400">
                <i class="fas fa-spinner fa-spin text-2xl mb-2 text-yellow-400"></i>
                <p class="text-sm">Загружаем добрые дела...</p>
            </div>
        </div>
    </div>

    <button onclick="alert('Откроется форма добавления для выбранного раздела')" class="fixed bottom-24 right-4 w-14 h-14 bg-yellow-400 text-white rounded-full shadow-lg shadow-yellow-200 text-2xl z-50 flex items-center justify-center transition-transform active:scale-90">
        <i class="fas fa-plus"></i>
    </button>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-between px-6 py-3 pb-safe z-50">
        <button onclick="switchTab('suitcase', '📦 Желтый чемоданчик')" class="flex flex-col items-center gap-1 tab-active w-1/4" id="tab-suitcase">
            <i class="fas fa-suitcase text-xl"></i>
            <span class="text-[10px] font-medium">Вещи</span>
        </button>
        <button onclick="switchTab('help', '🆘 Выручка')" class="flex flex-col items-center gap-1 tab-inactive w-1/4" id="tab-help">
            <i class="fas fa-hands-helping text-xl"></i>
            <span class="text-[10px] font-medium">Помощь</span>
        </button>
        <button onclick="switchTab('yard', '🌳 Дворик')" class="flex flex-col items-center gap-1 tab-inactive w-1/4" id="tab-yard">
            <i class="fas fa-tree text-xl"></i>
            <span class="text-[10px] font-medium">Встречи</span>
        </button>
        <button onclick="switchTab('navigator', '🧭 Навигатор')" class="flex flex-col items-center gap-1 tab-inactive w-1/4" id="tab-navigator">
            <i class="fas fa-compass text-xl"></i>
            <span class="text-[10px] font-medium">Места</span>
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp; 
        tg.expand();
        
        function switchTab(tabId, title) {
            document.getElementById('sectionTitle').innerText = title;
            const tabs = ['suitcase', 'help', 'yard', 'navigator'];
            tabs.forEach(t => {
                document.getElementById('tab-' + t).classList.remove('tab-active');
                document.getElementById('tab-' + t).classList.add('tab-inactive');
            });
            document.getElementById('tab-' + tabId).classList.remove('tab-inactive');
            document.getElementById('tab-' + tabId).classList.add('tab-active');
            loadData(tabId);
        }

        async function loadData(category = 'suitcase'){
            try {
                let r = await fetch('/api/items'); 
                let d = await r.json();
                let g = document.getElementById('grid');
                
                if(d.length == 0) {
                    g.innerHTML = `<div class="col-span-2 text-center py-10 text-gray-400">Здесь пока пусто. Станьте первым Прогрессором! 🌟</div>`;
                } else {
                    g.innerHTML = d.map(i => `
                        <div class="bg-white rounded-xl overflow-hidden border border-gray-100 shadow-sm">
                            <img src="${i.image||'https://placehold.co/400x300?text=Фото'}" class="w-full h-32 object-cover">
                            <div class="p-3">
                                <div class="font-bold text-sm text-gray-800 line-clamp-1">${i.title}</div>
                                <div class="text-xs text-yellow-500 mt-1 flex items-center gap-1"><i class="fas fa-map-pin"></i> ${i.district}</div>
                            </div>
                        </div>`).join('');
                }
            } catch(e) {
                console.error(e);
            }
        }

        loadData();
    </script>
</body>
</html>
